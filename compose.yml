services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "https://archive.org/download/tiny81/windose%2081%20littite.iso"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "180G"
      USERNAME: "vps"
      PASSWORD: "123456"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
